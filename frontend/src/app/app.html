<div class="container">
  <h2>🚚 Real-Time Routing (Angular 20)</h2>

  <div *ngIf="data() as d">
    <div *ngIf="d.hasNegativeCycle" class="error">
      ⚠ Negative Cycle Detected
    </div>

    <div *ngIf="!d.hasNegativeCycle">
      <h3>Shortest Distances:</h3>
      <ul>
        <li *ngFor="let d of d.distances; let i = index">
          Node {{ i }} → {{ d }}
        </li>
      </ul>
    </div>
  </div>
</div>
